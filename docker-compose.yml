version: '3.8'

# ============================================================
# SAP パンダ先生 — Docker Compose（本番環境）
# Nginx (React + WordPress 同一ポート) + PHP-FPM + MySQL
# ============================================================

services:
  # ---- React ビルド（一時コンテナ） ----
  admin-react-build:
    build:
      context: ./admin-react
      dockerfile: Dockerfile
      target: builder
    volumes:
      - admin-react-dist:/app/dist
    command: sh -c "cp -r /app/dist/* /dist-output/ 2>/dev/null; cp -r /app/dist /dist-output/"
    # ビルド完了後、自動終了
    profiles:
      - build

  # ---- Nginx（リバースプロキシ + React 静的ファイル配信） ----
  nginx:
    image: nginx:latest
    container_name: sap-panda-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - wordpress:/var/www/html:ro
      - admin-react-dist:/var/www/admin-react/dist:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - wordpress
    networks:
      - sap-panda-net
    restart: unless-stopped

  # ---- WordPress（PHP-FPM） ----
  wordpress:
    image: wordpress:6-php8.3-fpm
    container_name: sap-panda-wordpress
    volumes:
      - wordpress:/var/www/html
      - ./wordpress/wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wordpress/wp-content/themes:/var/www/html/wp-content/themes
      - ./wordpress/scripts:/scripts:ro
      - ./wordpress/wp-content/uploads:/var/www/html/wp-content/uploads
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', 'http://localhost');
        define('WP_SITEURL', 'http://localhost');
        define('JWT_AUTH_SECRET_KEY', '${JWT_SECRET:-sap-panda-jwt-secret-key-change-in-production}');
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sap-panda-net
    restart: unless-stopped

  # ---- MySQL ----
  db:
    image: mysql:8
    container_name: sap-panda-db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-wordpress}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - sap-panda-net
    restart: unless-stopped

volumes:
  wordpress:
  db_data:
  admin-react-dist:

networks:
  sap-panda-net:
    driver: bridge
