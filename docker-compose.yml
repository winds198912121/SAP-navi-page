# ============================================================
# SAP Panda Academy — Docker Compose（本番環境）
# Nginx (React SPA) + WordPress PHP-FPM + MySQL
# ============================================================
# 使用方法:
#   docker compose up -d --build              # 初回起動
#   docker compose up -d --build app          # フロントエンドのみ再ビルド
#   docker compose logs -f                    # ログ確認
#   docker compose down                       # 停止
# ============================================================

services:
  # ---- Nginx + React SPA ----
  app:
    build:
      context: .
      dockerfile: admin-react/Dockerfile
    image: sap-panda-academy:latest
    container_name: sap-panda-app
    ports:
      - "${APP_PORT:-80}:80"
      - "${APP_PORT_SSL:-443}:443"
    volumes:
      # WordPress アセット（wordpress-core volume から読み取り専用マウント）
      - wordpress-core:/var/www/html:ro
      # SSL 証明書
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      wordpress:
        condition: service_started
    networks:
      - sap-panda-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- WordPress PHP-FPM ----
  wordpress:
    image: wordpress:6-php8.3-fpm
    container_name: sap-panda-wordpress
    volumes:
      # WordPress コアファイルと wp-content の分離
      - wordpress-core:/var/www/html
      - ./wordpress/wp-content/plugins:/var/www/html/wp-content/plugins
      - ./wordpress/wp-content/themes:/var/www/html/wp-content/themes
      - ./wordpress/wp-content/languages:/var/www/html/wp-content/languages
      - ./wordpress/scripts:/scripts:ro
      - ./wordpress/php.ini:/usr/local/etc/php/conf.d/sap-panda.ini:ro
      - ./wordpress/php-fpm-override.conf:/usr/local/etc/php-fpm.d/zz-sap-panda.conf:ro
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD:-wordpress}
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_TABLE_PREFIX: wp_
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME', '${WP_HOME:-http://localhost}');
        define('WP_SITEURL', '${WP_SITEURL:-http://localhost}');
        define('JWT_AUTH_SECRET_KEY', '${JWT_SECRET:-sap-panda-jwt-secret-key-change-in-production}');
        define('JWT_AUTH_CORS_ENABLE', true);
        define('WP_POST_REVISIONS', 5);
        define('FORCE_SSL_ADMIN', ${FORCE_SSL_ADMIN:-false});
        define('AUTOMATIC_UPDATER_DISABLED', true);
        define('WP_AUTO_UPDATE_CORE', false);
        define('DISALLOW_FILE_EDIT', true);
      SSR_ENABLED: ${SSR_ENABLED:-1}
      SSR_HOST: ssr
      SSR_PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sap-panda-net
    restart: unless-stopped

  # ---- SSR Server (Node.js 渲染服务) ----
  ssr:
    build:
      context: .
      dockerfile: admin-react/Dockerfile.ssr
    image: sap-panda-ssr:latest
    container_name: sap-panda-ssr
    environment:
      PORT: 3000
      # WordPress 設置パス。空文字の場合はルート、/sap の場合は /sap
      SITE_BASE: ${SITE_BASE:-}
      # API ベース URL（デフォルトは自動構築）
      API_BASE: ${API_BASE:-}
      # 本番 = 1 で SSR 有効。開発では 0 にすると SSR をスキップ
      SSR_ENABLED: ${SSR_ENABLED:-1}
    ports:
      - "${SSR_PORT:-3000}:3000"
    depends_on:
      wordpress:
        condition: service_started
    networks:
      - sap-panda-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- MySQL ----
  db:
    image: mysql:8
    container_name: sap-panda-db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password_change_in_production}
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: ${DB_PASSWORD:-wordpress}
    ports:
      - "${DB_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - sap-panda-net
    restart: unless-stopped

volumes:
  wordpress-core:
  db_data:

networks:
  sap-panda-net:
    driver: bridge
