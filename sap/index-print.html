<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SAP パンダ先生 — 印刷版</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=JetBrains+Mono:wght@500;600;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ===== Print-friendly overrides ===== */
    @page {
      size: A4;
      margin: 12mm 10mm;
    }

    html, body {
      background: var(--bg-0) !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Force reveal-on-scroll to be visible */
    .reveal { opacity: 1 !important; transform: none !important; }

    /* Disable animations & sticky chrome that doesn't make sense in print */
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }

    .site-header {
      position: static !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      background: var(--bg-1) !important;
    }

    /* Hide interactive-only chrome */
    .float-panda,
    .twk-panel,
    [data-omelette-chrome] {
      display: none !important;
    }

    /* Search box & login button hidden — print-only */
    .nav-right { display: none !important; }
    .nav-main { gap: 8px !important; }

    /* Page-break hints between major sections */
    .hero { break-after: page; page-break-after: always; }
    .section { break-inside: avoid-page; page-break-inside: avoid; }
    .yt-section { break-before: auto; }
    .newsletter { break-inside: avoid; }
    .site-footer { break-before: auto; }

    /* Tighten paddings for printable density */
    .section { padding: 32px 24px !important; }
    .hero { padding: 28px 24px 12px !important; min-height: auto !important; }

    /* Card shadows soften (printers exaggerate them) */
    .mod-card, .path-card, .art-card, .top10, .newsletter, .toc-card, .share-block {
      box-shadow: none !important;
      border-color: var(--line-2) !important;
    }

    /* Backgrounds: ensure colored areas print */
    .yt-section, .quiz-card, .quiz-right,
    .mod-icon, .cat-big-icon, .blackboard,
    .callout-box, .filter-block,
    .level-pill, .tag-mod, .tag-diff,
    .badge, .hero-eyebrow, .callout,
    .path-card, .art-card .cover, .article-thumb,
    .quiz-explain, .audio-wave span,
    .yt-vid .play-ico, .yt-vid .duration {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }

    /* Hero scene a touch shorter on print */
    .hero-scene { aspect-ratio: 1/0.85; }

    /* Avoid breaking inside cards */
    .mod-card, .path-card, .art-card, .top10-item, .article-row, .yt-vid {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Footer styling — pure dark, full-bleed */
    .site-footer {
      background: var(--ink-0) !important;
      color: rgba(255,255,255,0.7) !important;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    // Tell Tweaks panel / floating mascot not to render
    window.__PRINT_MODE = true;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app/panda.jsx"></script>
  <script type="text/babel" src="app/components.jsx"></script>
  <script type="text/babel" src="app/home.jsx"></script>

  <script type="text/babel">
    // Wait for fonts + babel to settle, then auto-print.
    (async () => {
      try { await document.fonts.ready; } catch (e) {}
      // Give Babel transforms + React mount time to settle
      await new Promise(r => setTimeout(r, 1200));
      window.print();
    })();
  </script>
</body>
</html>
