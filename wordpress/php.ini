; ============================================================
; SAP Panda Academy — 開発用 PHP 設定
; 使用法: php -c php.ini -S localhost:8080 -t .
; ============================================================

[PHP]
; ファイルアップロード
upload_max_filesize = 64M
post_max_size = 128M
max_file_uploads = 50

; 実行時間
max_execution_time = 300
max_input_time = 300

; メモリ
memory_limit = 256M
