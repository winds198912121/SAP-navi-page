# ============================================================
# SAP Panda Next.js — Standalone Nginx Reverse Proxy
#
# Next.js SSR (port 3000) の前段に配置する Nginx 設定。
# - SSL 終端
# - 静的アセットの強力キャッシュ
# - WP REST API のプロキシ（必要に応じて）
# - セキュリティヘッダー
#
# 設置先: /etc/nginx/sites-available/sap-panda-nextjs
# 有効化: ln -sf /etc/nginx/sites-available/sap-panda-nextjs /etc/nginx/sites-enabled/
# ============================================================

upstream nextjs {
    server 127.0.0.1:3000;
    # Docker で別コンテナの場合は:
    # server nextjs:3000;
}

server {
    listen 80;
    server_name your-nextjs-domain.com;

    # ---- セキュリティヘッダー ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- Gzip ----
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json
               application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    client_max_body_size 64M;

    access_log /var/log/nginx/sap-panda-access.log;
    error_log  /var/log/nginx/sap-panda-error.log;

    # ---- Next.js 静的アセット（強力キャッシュ） ----
    location /_next/static/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /static/ {
        proxy_pass http://nextjs;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- 公開静的ファイル ----
    location = /favicon.ico {
        proxy_pass http://nextjs;
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        proxy_pass http://nextjs;
        access_log off;
        log_not_found off;
    }

    # ---- ヘルスチェックエンドポイント ----
    location = /health {
        proxy_pass http://nextjs;
        access_log off;
    }

    # ---- WordPress 関連パス（リモート WordPress へプロキシ） ----
    # 注意: これらの location は next.config.js の rewrites でも処理可能ですが、
    # Nginx レベルでプロキシするとより効率的です。
    # 必要な場合のみコメントを外してください。
    #
    # location /wp-json/ {
    #     proxy_pass https://sap-navi.aladdin-techec.com;
    #     proxy_set_header Host sap-navi.aladdin-techec.com;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    #
    # location /wp-content/ {
    #     proxy_pass https://sap-navi.aladdin-techec.com;
    #     proxy_set_header Host sap-navi.aladdin-techec.com;
    #     expires 30d;
    #     add_header Cache-Control "public";
    #     access_log off;
    # }

    # ---- メインルート：すべて Next.js SSR へ ----
    location / {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;

        # WebSocket サポート（Next.js HMR / 開発時）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ---- セキュリティ：隠しファイル拒否 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

