# ============================================================
# SAP パンダ先生 — Nginx Production Configuration (サーバー用)
# 使用法:
#   sudo cp production.conf /etc/nginx/sites-available/sap-panda
#   sudo ln -s /etc/nginx/sites-available/sap-panda /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSR (サーバーサイドレンダリング) 対応版 v2.4
# Node.js SSR サーバー (port 3000) が動作している必要あり
# セットアップ: bash deploy/scripts/setup-ssr.sh
# ============================================================

upstream wordpress_php {
    # PHP-FPM (Ubuntu 標準)
    server unix:/var/run/php/php8.3-fpm.sock;
    # server unix:/var/run/php/php8.2-fpm.sock;  # PHP 8.2 の場合
}

upstream ssr_server {
    server 127.0.0.1:3000;
}

# ---- クローラー User-Agent マッピング ----
map $http_user_agent $is_bot {
    default 0;
    "~*(googlebot|bingbot|yandexbot|baiduspider|facebookexternalhit|twitterbot|whatsapp|slurp|bot|crawl|spider|pinterest|discordbot|slackbot|telegrambot|applebot|duckduckbot)" 1;
}

# HTTP → HTTPS リダイレクト
server {
    listen 80;
    server_name sap-panda.com www.sap-panda.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sap-panda.com www.sap-panda.com;

    # -------------------------------------------------------
    # SSL (Let's Encrypt)
    # -------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/sap-panda.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sap-panda.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # -------------------------------------------------------
    # セキュリティヘッダー
    # -------------------------------------------------------
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # -------------------------------------------------------
    # ファイルアップロード上限
    # -------------------------------------------------------
    client_max_body_size 64M;

    # -------------------------------------------------------
    # React SPA のルート（WordPress テーマディレクトリ）
    # -------------------------------------------------------
    root /var/www/html/wp-content/themes/sap-panda;
    index index.html;

    # -------------------------------------------------------
    # ログ
    # -------------------------------------------------------
    access_log /var/log/nginx/sap-panda-access.log;
    error_log  /var/log/nginx/sap-panda-error.log;

    # -------------------------------------------------------
    # 静的アセット（強キャッシュ）
    # -------------------------------------------------------
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # robots.txt
    location = /robots.txt {
        access_log off;
    }

    # sitemap → WordPress API
    location = /sitemap.xml {
        proxy_pass http://wordpress_php/wp-json/sap/v1/sitemap;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------------------------------
    # WordPress アセット（テーマとは別パス）
    # -------------------------------------------------------
    location /wp-content/ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /wp-includes/ {
        root /var/www/html;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------
    # WordPress REST API と管理画面 → PHP-FPM
    # -------------------------------------------------------
    location /wp-json/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /wp-admin/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WordPress 認証系 PHP ファイル
    location ~ ^/(wp-login\.php|wp-signup\.php|wp-cron\.php|xmlrpc\.php) {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # その他 PHP リクエスト
    location ~ \.php$ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===========================================================
    # SSR (サーバーサイドレンダリング) — クローラー用
    # ===========================================================
    # SSR 内部エンドポイント
    location @ssr {
        proxy_pass http://ssr_server;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # React SPA ルーティング（SSR 対応）
    # -------------------------------------------------------
    location / {
        error_page 418 = @ssr;

        # クローラー検出 → SSR レンダリング
        if ($is_bot) {
            return 418;
        }

        # 通常ユーザー → SPA
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # 機密ファイルへのアクセスをブロック
    # -------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(?:uploads|files)/.*\.php$ {
        deny all;
    }
}

