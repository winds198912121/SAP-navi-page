# ============================================================
# SAP パンダ先生 — Nginx Production Configuration
# 前端 React SPA + WordPress 同域名同端口
# ============================================================

upstream wordpress_php {
    # Native 模式: WordPress PHP built-in server
    server 127.0.0.1:8080;
    # Docker 模式: WordPress PHP-FPM (コメント切替)
    # server wordpress:9000;
}

# HTTP → HTTPS リダイレクト（本番環境のみ）
# server {
#     listen 80;
#     server_name sap-panda.com www.sap-panda.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # HTTPS 時はコメント解除
    server_name localhost sap-panda.com www.sap-panda.com;

    # -------------------------------------------------------
    # SSL（Let's Encrypt 取得後にコメント解除）
    # -------------------------------------------------------
    # ssl_certificate     /usr/local/etc/letsencrypt/live/sap-panda.com/fullchain.pem;
    # ssl_certificate_key /usr/local/etc/letsencrypt/live/sap-panda.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # -------------------------------------------------------
    # セキュリティヘッダー
    # -------------------------------------------------------
    add_header X-Content-Type-Options "nosniff";
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # -------------------------------------------------------
    # Gzip 圧縮
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    # -------------------------------------------------------
    # ログ
    # -------------------------------------------------------
    access_log /usr/local/var/log/nginx/sap-panda-access.log;
    error_log  /usr/local/var/log/nginx/sap-panda-error.log;

    # -------------------------------------------------------
    # React ビルドファイルのルート
    # -------------------------------------------------------
    root /Users/howard/Desktop/pm/sap-panda/admin-react/dist;
    index index.html;

    # -------------------------------------------------------
    # 静的アセット（強キャッシュ）
    # -------------------------------------------------------
    location /assets/ {
        root /Users/howard/Desktop/pm/sap-panda/admin-react/dist;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------
    # robots.txt / sitemap.xml
    # -------------------------------------------------------
    location = /robots.txt {
        root /Users/howard/Desktop/pm/sap-panda/admin-react/public;
    }

    # sitemap → WordPress API から動的生成
    location = /sitemap.xml {
        proxy_pass http://wordpress_php/wp-json/sap/v1/sitemap;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------------------------------
    # WordPress アセット（アップロード / テーマ / プラグイン）
    # -------------------------------------------------------
    location /wp-content/ {
        root /Users/howard/Desktop/pm/sap-panda/wordpress;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /wp-includes/ {
        root /Users/howard/Desktop/pm/sap-panda/wordpress;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------
    # WordPress admin & REST API → PHP バックエンド
    # -------------------------------------------------------
    location /wp-admin/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /wp-json/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WordPress 管理画面関連のファイル
    location ~ ^/(wp-login\.php|wp-signup\.php|wp-cron\.php|xmlrpc\.php) {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # -------------------------------------------------------
    # WordPress ルートファイル（php 拡張子）
    # -------------------------------------------------------
    location ~ \.php$ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------------------------------
    # React SPA — クライアントサイドルーティング
    # 存在しないパスは index.html にフォールバック
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
