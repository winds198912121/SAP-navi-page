# ============================================================
# SAP Panda Academy — Nginx Production Configuration (Docker)
# React SPA + WordPress PHP-FPM 同域名同端口
# ============================================================

upstream wordpress_php {
    server wordpress:9000;
}

# HTTP → HTTPS リダイレクト（本番環境で .env の ENABLE_SSL=true 時に有効化）
# server {
#     listen 80;
#     server_name sap-panda.com www.sap-panda.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # HTTPS 時はコメント解除
    server_name _;

    # -------------------------------------------------------
    # SSL（Let's Encrypt — 本番環境で有効化）
    # -------------------------------------------------------
    # ssl_certificate     /etc/letsencrypt/live/sap-panda.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sap-panda.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;

    # -------------------------------------------------------
    # セキュリティヘッダー
    # -------------------------------------------------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # -------------------------------------------------------
    # Gzip 圧縮
    # -------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/xml+rss image/svg+xml;
    gzip_min_length 256;
    gzip_comp_level 6;

    # -------------------------------------------------------
    # ファイルアップロード上限
    # -------------------------------------------------------
    client_max_body_size 64M;

    # -------------------------------------------------------
    # React SPA 的文档根目录（Docker 内）
    # -------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------
    # 日志
    # -------------------------------------------------------
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # -------------------------------------------------------
    # 静态资源（强缓存）
    # -------------------------------------------------------
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # -------------------------------------------------------
    # robots.txt / sitemap.xml
    # -------------------------------------------------------
    location = /robots.txt {
        access_log off;
    }

    location = /sitemap.xml {
        proxy_pass http://wordpress_php/wp-json/sap/v1/sitemap;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # -------------------------------------------------------
    # WordPress 资源（上传文件 / 插件 / 主题）
    # -------------------------------------------------------
    location /wp-content/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /wp-includes/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # -------------------------------------------------------
    # WordPress REST API
    # -------------------------------------------------------
    location /wp-json/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # -------------------------------------------------------
    # WordPress 管理后台
    # -------------------------------------------------------
    location /wp-admin/ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # WordPress 认证相关 PHP 文件
    location ~ ^/(wp-login\.php|wp-signup\.php|wp-cron\.php|xmlrpc\.php) {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # 其他 PHP 请求 → WordPress PHP-FPM
    # -------------------------------------------------------
    location ~ \.php$ {
        proxy_pass http://wordpress_php;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # -------------------------------------------------------
    # React SPA 路由 — 未匹配路径回退到 index.html
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------
    # 屏蔽敏感文件
    # -------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(?:uploads|files)/.*\.php$ {
        deny all;
    }
}
