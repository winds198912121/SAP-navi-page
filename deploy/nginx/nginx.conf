# ============================================================
# SAP Panda Academy — Nginx Production Configuration (Docker)
#
# 架构:
#   爬虫 → Nginx (bot 检测) → SSR Server (Node.js) → 完整 HTML
#   用户 → Nginx → React SPA (index.html)
#   WordPress API → Nginx → WordPress PHP-FPM
# ============================================================

# ---- 机器人 User-Agent 映射 ----
map $http_user_agent $is_bot {
    default 0;
    "~*(googlebot|bingbot|yandexbot|baiduspider|facebookexternalhit|twitterbot|whatsapp|slurp|bot|crawl|spider|pinterest|discordbot|slackbot|telegrambot|applebot|duckduckbot)" 1;
}

upstream wordpress_php {
    server wordpress:9000;
}

# ---- WordPress (PHP-FPM, internal only) ----
server {
    listen 8080;
    server_name _;

    root /var/www/html;
    index index.php;

    access_log /var/log/nginx/wp-access.log;
    error_log  /var/log/nginx/wp-error.log;

    location /wp-content/ { expires 30d; add_header Cache-Control "public"; access_log off; }
    location /wp-includes/ { expires 30d; add_header Cache-Control "public"; access_log off; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress_php;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ /(?:uploads|files)/.*\.php$ { deny all; }
    location ~ /wp-config.*\.php$ { deny all; access_log off; log_not_found off; }
}

# ---- React SPA + 机器人 SSR (public) ----
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on; gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 256; gzip_comp_level 6;
    client_max_body_size 64M;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # React 静态资源（强缓存）
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PHP 文件 → WordPress internal server
    location ~ \.php$ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress REST API → WordPress
    location /wp-json/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress 管理画面 → WordPress
    location /wp-admin/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WordPress 认证文件
    location ~ ^/(wp-login\.php|wp-signup\.php|wp-cron\.php|xmlrpc\.php) {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # WordPress 静态资源
    location /wp-content/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d; add_header Cache-Control "public"; access_log off;
    }
    location /wp-includes/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        expires 30d; add_header Cache-Control "public"; access_log off;
    }

    location = /robots.txt { log_not_found off; access_log off; }

    location / {
        error_page 418 = @ssr;

        if ($is_bot) {
            return 418;
        }

        try_files $uri $uri/ /index.html;
    }

    location @ssr {
        proxy_pass http://ssr:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # 安全
    location ~ /\. { deny all; access_log off; log_not_found off; }
    location ~ /(?:uploads|files)/.*\.php$ { deny all; }
    location ~ /wp-config.*\.php$ { deny all; access_log off; log_not_found off; }
}
