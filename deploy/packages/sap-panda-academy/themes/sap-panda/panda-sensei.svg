<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background glow -->
  <circle cx="100" cy="100" r="90" fill="#e8f0fb" opacity="0.3" />

  <!-- Left ear -->
  <ellipse cx="36" cy="42" rx="24" ry="22" fill="#1a1612" />
  <ellipse cx="36" cy="44" rx="12" ry="10" fill="#3a2e22" />
  <!-- Right ear -->
  <ellipse cx="164" cy="42" rx="24" ry="22" fill="#1a1612" />
  <ellipse cx="164" cy="44" rx="12" ry="10" fill="#3a2e22" />

  <!-- Face -->
  <path d="M 100 20 C 44 20 16 56 16 100 C 16 144 40 176 100 176 C 160 176 184 144 184 100 C 184 56 156 20 100 20 Z" fill="#fdfaf2" />

  <!-- Left eye patch -->
  <path d="M 36 70 Q 44 56 64 60 Q 84 64 84 88 Q 84 112 64 116 Q 40 116 32 100 Q 28 86 36 70 Z" fill="#1a1612" />
  <!-- Right eye patch -->
  <path d="M 164 70 Q 156 56 136 60 Q 116 64 116 88 Q 116 112 136 116 Q 160 116 168 100 Q 172 86 164 70 Z" fill="#1a1612" />

  <!-- Left eye -->
  <circle cx="60" cy="88" r="8" fill="#ffffff" />
  <circle cx="60" cy="88" r="5.5" fill="#0e0a05" />
  <circle cx="58" cy="86" r="2" fill="#ffffff" />

  <!-- Right eye -->
  <circle cx="140" cy="88" r="8" fill="#ffffff" />
  <circle cx="140" cy="88" r="5.5" fill="#0e0a05" />
  <circle cx="138" cy="86" r="2" fill="#ffffff" />

  <!-- Blush -->
  <ellipse cx="36" cy="128" rx="12" ry="7" fill="#f4b8c4" opacity="0.5" />
  <ellipse cx="164" cy="128" rx="12" ry="7" fill="#f4b8c4" opacity="0.5" />

  <!-- Nose -->
  <ellipse cx="100" cy="120" rx="8" ry="6" fill="#1a1612" />

  <!-- Mouth -->
  <path d="M 100 124 L 100 130" stroke="#1a1612" stroke-width="3" stroke-linecap="round" />
  <path d="M 86 134 Q 100 146 114 134" fill="none" stroke="#1a1612" stroke-width="4" stroke-linecap="round" />

  <!-- Graduation cap -->
  <path d="M 44 80 L 100 52 L 156 80 L 100 108 Z" fill="#2a2317" />
  <path d="M 40 84 L 40 100 Q 100 128 160 100 L 160 84" fill="none" stroke="#2a2317" stroke-width="5" stroke-linecap="round" />
  <!-- Cap tassel -->
  <rect x="92" y="108" width="16" height="12" rx="3" fill="#d97548" />
  <line x1="100" y1="120" x2="100" y2="132" stroke="#d97548" stroke-width="3" stroke-linecap="round" />

  <!-- Word bubble -->
  <g transform="translate(130, 10)">
    <path d="M 0 0 Q 10 -10 25 -10 L 45 -10 Q 55 -10 55 0 L 55 16 Q 55 26 45 26 L 20 26 L 10 36 L 14 26 L 10 26 Q 0 26 0 16 Z" fill="#ffffff" stroke="#d8ead9" stroke-width="1.5" />
    <text x="27" y="12" font-size="14" fill="#3e7a52" text-anchor="middle" font-family="serif">?</text>
  </g>

  <!-- Small question marks floating -->
  <text x="170" y="50" font-size="28" fill="#d97548" opacity="0.5" font-family="serif">?</text>
  <text x="20" y="170" font-size="22" fill="#5a9d6e" opacity="0.4" font-family="serif">?</text>
</svg>
